<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Contact | Team Turco </title>
        <link rel="stylesheet" href="../css/style.css">
        <link rel="icon" type="image/svg+xml" href="../images/Team-Turco-Logo-Header.jpg" />
        <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-..."
        crossorigin="anonymous"
        referrerpolicy="no-referrer"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <header class="bg-black text-white px-6 py-3 relative">
            <!-- MOBILE HEADER DIV-->
            <div class="flex items-center justify-between md:hidden">
                <button id="lang-btn" class="text-3xl cursor-pointer transition-transform duration-300 ease-in-out 
                transform hover:scale-110 ">
                    <i class="fa-solid fa-language"></i>
                </button>
                <a href="../index.html">
                    <img src="../images/Team-Turco-Logo-Header.jpg"
                    class="w-12 h-12 object-cover transition-transform duration-300 ease-in-out 
                transform hover:scale-110" />
                </a>
                <button id="dropdown-btn" class="text-3xl cursor-pointer">☰</button>
            </div>

            <!-- DESKTOP HEADER DIV-->

            <div class="hidden md:flex mx-4 md:mx-14 items-center justify-between">
                <a href="../index.html">
                    <img src="../images/Team-Turco-Logo-Header.jpg"
                    class="w-12 h-12 object-cover transition-transform duration-300 ease-in-out 
                transform hover:scale-110" />
                </a>
                <nav>
                    <ul class="font-redwing flex gap-8">
                        <li><a href="../index.html" class="hover:border-b-2 p-2" data-i18n="nav.home">Home</a></li>
                        <li><a href="about.html" class="hover:border-b-2 p-2" data-i18n="nav.about">About</a></li>
                        <li><a href="athletes.html" class="hover:border-b-2 p-2" data-i18n="nav.athletes">Athletes</a></li>
                        <li><a href="contact.html" class="hover:border-b-2 p-2" data-i18n="nav.contact">Contact</a></li>
                    </ul>
                </nav>
                <div class="flex items-center justify-between hidden md:block">
                    <div class="flex items-center justify-between hidden md:block">
                        <button id="lang-btn-desktop" class="text-3xl cursor-pointer transition-transform duration-300 ease-in-out 
                        transform hover:scale-110 ">
                            <i class="fa-solid fa-language"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- LANGUAGE NAV -->
            <nav class="hidden md:hidden absolute top-full left-4 w-13 bg-black text-white z-50 border border-gray-700 rounded flex flex-col"
            id="lang-nav">
                <button data-lang="en" class="lang-btn-option p-2 pl-2 hover:bg-white hover:text-black text-sm cursor-pointer">EN</button>
                <button data-lang="es" class="lang-btn-option p-2 pl-2 hover:bg-white hover:text-black text-sm cursor-pointer">ES</button>
                <button data-lang="pt" class="lang-btn-option p-2 pl-2 hover:bg-white hover:text-black text-sm cursor-pointer ">PT</button>
            </nav>

            <!-- LANGUAGE NAV DESKTOP -->
            <nav class="hidden absolute top-full right-18 w-13 bg-black text-white z-50 border border-gray-700 rounded flex flex-col"
            id="lang-nav-desktop">
                <button data-lang="en" class="lang-btn-option p-2 pl-2 hover:bg-white hover:text-black text-sm cursor-pointer">EN</button>
                <button data-lang="es" class="lang-btn-option p-2 pl-2 hover:bg-white hover:text-black text-sm cursor-pointer">ES</button>
                <button data-lang="pt" class="lang-btn-option p-2 pl-2 hover:bg-white hover:text-black text-sm cursor-pointer ">PT</button>
            </nav>

            <nav
            id="mobile-nav"
            class="hidden md:hidden absolute top-full right-1 w-30 bg-black text-white z-50 border border-gray-700 rounded flex flex-col">
                <a href="../index.html"
                class="p-2 pl-2 hover:bg-white hover:text-black text-sm" data-i18n="nav.home">Home</a>
                <a href="about.html"
                class="p-2 pl-2 hover:bg-white hover:text-black text-sm" data-i18n="nav.about">About</a>
                <a href="athletes.html"
                class="p-2 pl-2 hover:bg-white hover:text-black text-sm" data-i18n="nav.athletes">Athletes</a>                
                <a href="contact.html" 
                class="p-2 pl-2 hover:bg-white hover:text-black text-sm" data-i18n="nav.contact">Contact</a>
            </nav>
        </header>
        <main class="py-12 px-6 flex flex-col md:flex-row gap-6 md:px-20 border-t border-white/20">
            <!-- Title -->
            <div class="w-full mb-4 sm:mb-12">
                <h2 class="font-[Orbitron] text-black text-3xl md:text-5xl leading-tight">
                    Contact Us
                </h2>
                <div class="w-24 h-[3px] bg-blue-600 mt-4"></div>
                <p class="text-black font-redwing mt-4 text-lg">
                    Contact us to learn more about our training programs and how we can help you achieve your athletic goals.
                </p>
                <p class="text-black font-redwing text-lg">Responses might take 1-2 days from us to email you back.</p>
                <img src="../images/White_Team-Turco-logo.jpeg" class="w-20 h-20 pt-4 flex mx-auto sm:mx-0 object-cover">
            </div>
            <!-- Contact Form -->
             <form class="w-full mt-4" id="contact-form">
                <div class="max-w-4xl">
                    <label for="name" class="block text-sm font-medium text-gray-700">Full Name:</label>
                    <input type="text" name="name" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                    <span id="name-error" class="text-red-500 text-sm"></span>
                </div>
                <div class="max-w-4xl mt-6">
                    <label for="email" class="block text-sm font-medium text-gray-700">Email:</label>
                    <input type="email" name="email" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                    <span id="email-error" class="text-red-500 text-sm"></span>
                </div>
                <div class="max-w-4xl mt-6">
                    <label for="subject" class="block text-sm font-medium text-gray-700">Subject:</label>
                    <input type="text" name="subject" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                    <span id="subject-error" class="text-red-500 text-sm"></span>
                </div>
                <div class="max-w-4xl mt-6">
                    <label for="message" class="block text-sm font-medium text-gray-700">Message:</label>
                    <textarea id="message" name="message" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                    <span id="message-error" class="text-red-500 text-sm"></span>
                </div>
                <button 
                type="submit"
                id="submit-btn"
                 class=" w-full mt-6 bg-black text-white font-redwing px-4 py-2 rounded hover:bg-white hover:text-black cursor-pointer transition-colors duration-300">
                    SEND MESSAGE</button>
                <div>
                    <span id="general-error"
                    class="text-red-500 text-sm"></span>
                </div>
             </form>
        </main>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
        <script type="module" src="../js/i18n.js"></script>
    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/contact.js"></script>
    </body>
</html>
